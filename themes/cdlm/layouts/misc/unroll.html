{{ define "main" }}
<div class="container--single">
  <div class="container--single-content">
    <h2>{{ .Title }}</h2>
    {{ $current := .Site.Params.current }}
    {{ $pages := .RegularPages }}
    {{ $sorted := sort $pages "Params.year" "desc" }}
    {{ range $sorted }}
      {{ if le .Params.year $current }}
        <h3>{{ .Title }}</h3>
        {{ .Content }}
      {{ end }}
    {{ end }}
  </div>
</div>
{{ end }}
